<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Core browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0f0f1e; color: #fff; overflow: hidden; }
        #homePage { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
       .logo { font-size: 3rem; margin-bottom: 30px; background: linear-gradient(45deg, #00f5a0, #00d9f5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
       .search-container { width: 100%; max-width: 600px; position: relative; }
       .search-box { width: 100%; padding: 15px 20px; border-radius: 50px; border: 2px solid #00f5a0; background: #1a1a2e; color: #fff; font-size: 1.1rem; outline: none; }
       .search-box:focus { border-color: #00d9f5; box-shadow: 0 0 20px rgba(0, 217, 245, 0.3); }
       .suggestions { position: absolute; top: 60px; width: 100%; background: #1a1a2e; border-radius: 15px; max-height: 300px; overflow-y: auto; display: none; z-index: 100; }
       .suggestion-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #2a2a3e; }
       .suggestion-item:hover { background: #2a2a3e; }
        #browserPage { display: none; height: 100vh; flex-direction: column; }
       .url-bar-container { display: flex; padding: 10px; background: #1a1a2e; gap: 10px; align-items: center; }
       .nav-btn { background: #2a2a3e; border: none; color: #00f5a0; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
       .nav-btn:hover { background: #3a3a4e; }
        #urlBar { flex: 1; padding: 10px 15px; border-radius: 10px; border: 1px solid #2a2a3e; background: #0f0f1e; color: #fff; outline: none; }
        #frame { width: 100%; height: 100%; border: none; flex: 1; background: #fff; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #00f5a0; color: #0f0f1e; padding: 12px 25px; border-radius: 50px; font-weight: bold; display: none; z-index: 9999; }
       .home-btn { position: fixed; bottom: 20px; right: 20px; background: #00f5a0; color: #0f0f1e; width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer; z-index: 1000; box-shadow: 0 5px 20px rgba(0, 245, 160, 0.4); }
    </style>
</head>
<body>
    <div id="homePage">
        <div class="logo">متصفح الإمبراطور ⚡</div>
        <div class="search-container">
            <input type="text" class="search-box" id="searchInput" placeholder="ابحث في Bing أو اكتب عنوان..." oninput="showSearchSuggestions()" onkeypress="if(event.key==='Enter') searchGo()">
            <div class="suggestions" id="searchSuggestions"></div>
        </div>
    </div>

    <div id="browserPage">
        <div class="url-bar-container">
            <button class="nav-btn" onclick="goBack()">←</button>
            <button class="nav-btn" onclick="goForward()">→</button>
            <button class="nav-btn" onclick="reloadPage()">⟳</button>
            <input type="text" id="urlBar" onkeypress="if(event.key==='Enter') goToUrl(this.value)">
            <button class="nav-btn" onclick="goHome()">🏠</button>
        </div>
        <iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>

    <button class="home-btn" onclick="goHome()">🏠</button>
    <div id="toast"></div>

    <script>
        let historyStack = [];
        let historyIndex = -1;
        let adultSites = ['porn', 'xxx', 'sex'];

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function searchGo() {
            let u = document.getElementById('searchInput').value.trim();
            if (!u) return;
            goToUrl(u);
        }

        function goToUrl(u) {
            hideSearchSuggestions();
            if (!u) return;

            // لو مش رابط، ابحث في Bing
            if (!u.startsWith('http') &&!u.includes('.')) {
                u = 'https://www.bing.com/search?q=' + encodeURIComponent(u);
            } else if (!u.startsWith('http')) {
                u = 'https://' + u;
            }

            // وضع الأهل
            if(localStorage.getItem('parentalMode') === 'true') {
                if(adultSites.some(site => u.toLowerCase().includes(site))) {
                    showToast('تم حظر هذا الموقع بواسطة وضع الأهل 🔒');
                    return;
                }
            }

            addHistory(u);
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('browserPage').style.display = 'flex';
            document.getElementById('urlBar').value = u;

            // افتح مباشر - في الـ APK هيشتغل كل المواقع
            document.getElementById('frame').src = u;
            showToast('جاري الفتح... ⚡');
        }

        function addHistory(u) {
            historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(u);
            historyIndex = historyStack.length - 1;
        }

        function goBack() {
            if (historyIndex > 0) {
                historyIndex--;
                document.getElementById('frame').src = historyStack[historyIndex];
                document.getElementById('urlBar').value = historyStack[historyIndex];
            }
        }

        function goForward() {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                document.getElementById('frame').src = historyStack[historyIndex];
                document.getElementById('urlBar').value = historyStack[historyIndex];
            }
        }

        function reloadPage() {
            document.getElementById('frame').src = document.getElementById('frame').src;
        }

        function goHome() {
            document.getElementById('browserPage').style.display = 'none';
            document.getElementById('homePage').style.display = 'flex';
            document.getElementById('searchInput').value = '';
        }

        function showSearchSuggestions() {
            const val = document.getElementById('searchInput').value.trim();
            const box = document.getElementById('searchSuggestions');
            if (!val) { box.style.display = 'none'; return; }

            const suggestions = [
                val + ' download',
                val + ' apk',
                val + ' للكمبيوتر',
                val + ' شرح'
            ];

            box.innerHTML = suggestions.map(s => `<div class="suggestion-item" onclick="document.getElementById('searchInput').value='${s}'; searchGo()">${s}</div>`).join('');
            box.style.display = 'block';
        }

        function hideSearchSuggestions() {
            setTimeout(() => document.getElementById('searchSuggestions').style.display = 'none', 200);
        }

        // اختصار لوضع الأهل: دوس 5 مرات على اللوجو
        let clickCount = 0;
        document.querySelector('.logo').addEventListener('click', () => {
            clickCount++;
            if (clickCount >= 5) {
                let current = localStorage.getItem('parentalMode') === 'true';
                localStorage.setItem('parentalMode',!current);
                showToast(!current? 'تم تفعيل وضع الأهل 🔒' : 'تم إلغاء وضع الأهل 🔓');
                clickCount = 0;
            }
            setTimeout(() => clickCount = 0, 2000);
        });
    </script>
</body>
</html>
